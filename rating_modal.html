<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rate Transaction — Daladan</title>
    <meta name="description" content="Rate your transaction partner after a completed deal on the Daladan platform." />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        /* Backdrop blur in */
        @keyframes backdropIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px) scale(0.95);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        #rating-modal.show .modal-backdrop {
            animation: backdropIn 0.25s ease forwards;
        }

        #rating-modal.show .modal-card {
            animation: slideUp 0.3s ease forwards;
        }

        /* Star hover effects */
        .star-btn {
            transition: transform 0.15s ease;
        }

        .star-btn:hover {
            transform: scale(1.25);
        }

        .star-btn.active svg {
            fill: #fbbf24;
            color: #fbbf24;
        }

        /* Toast */
        @keyframes toastIn {
            from {
                transform: translateY(20px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        #toast.show {
            animation: toastIn 0.3s ease forwards;
        }
    </style>
</head>

<body class="bg-gray-950 text-white min-h-screen flex items-center justify-center">

    <!-- Trigger button (for demo purposes) -->
    <button onclick="triggerRatingModal('demo-order-123', 'demo-user-456')"
        class="px-6 py-3 bg-indigo-600 hover:bg-indigo-500 rounded-xl font-semibold transition-colors">
        Open Rating Modal (Demo)
    </button>

    <!-- ────── RATING MODAL ────── -->
    <div id="rating-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4">
        <!-- Backdrop -->
        <div class="modal-backdrop absolute inset-0 bg-black/70 backdrop-blur-sm" onclick="closeRatingModal()"></div>

        <!-- Card -->
        <div class="modal-card relative bg-gray-900 border border-white/10 rounded-2xl p-8 w-full max-w-md shadow-2xl">
            <!-- Close -->
            <button onclick="closeRatingModal()"
                class="absolute top-4 right-4 text-gray-500 hover:text-white transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>

            <h2 class="text-xl font-bold text-center mb-1">Rate this Transaction</h2>
            <p class="text-gray-400 text-sm text-center mb-6">How was your experience?</p>

            <form id="rating-form" onsubmit="submitRating(event)">
                <!-- Hidden fields -->
                <input type="hidden" id="rating-order-id" />
                <input type="hidden" id="rating-target-user" />

                <!-- Stars -->
                <div class="flex justify-center gap-2 mb-8">
                    <button type="button" class="star-btn" data-score="1" onclick="setScore(1)">
                        <svg class="w-10 h-10 text-gray-600" fill="none" stroke="currentColor" stroke-width="1.5"
                            viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M11.48 3.499a.562.562 0 011.04 0l2.125 5.111a.563.563 0 00.475.345l5.518.442c.499.04.701.663.321.988l-4.204 3.602a.563.563 0 00-.182.557l1.285 5.385a.562.562 0 01-.84.61l-4.725-2.885a.563.563 0 00-.586 0L6.982 20.54a.562.562 0 01-.84-.61l1.285-5.386a.562.562 0 00-.182-.557l-4.204-3.602a.563.563 0 01.321-.988l5.518-.442a.563.563 0 00.475-.345L11.48 3.5z" />
                        </svg>
                    </button>
                    <button type="button" class="star-btn" data-score="2" onclick="setScore(2)">
                        <svg class="w-10 h-10 text-gray-600" fill="none" stroke="currentColor" stroke-width="1.5"
                            viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M11.48 3.499a.562.562 0 011.04 0l2.125 5.111a.563.563 0 00.475.345l5.518.442c.499.04.701.663.321.988l-4.204 3.602a.563.563 0 00-.182.557l1.285 5.385a.562.562 0 01-.84.61l-4.725-2.885a.563.563 0 00-.586 0L6.982 20.54a.562.562 0 01-.84-.61l1.285-5.386a.562.562 0 00-.182-.557l-4.204-3.602a.563.563 0 01.321-.988l5.518-.442a.563.563 0 00.475-.345L11.48 3.5z" />
                        </svg>
                    </button>
                    <button type="button" class="star-btn" data-score="3" onclick="setScore(3)">
                        <svg class="w-10 h-10 text-gray-600" fill="none" stroke="currentColor" stroke-width="1.5"
                            viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M11.48 3.499a.562.562 0 011.04 0l2.125 5.111a.563.563 0 00.475.345l5.518.442c.499.04.701.663.321.988l-4.204 3.602a.563.563 0 00-.182.557l1.285 5.385a.562.562 0 01-.84.61l-4.725-2.885a.563.563 0 00-.586 0L6.982 20.54a.562.562 0 01-.84-.61l1.285-5.386a.562.562 0 00-.182-.557l-4.204-3.602a.563.563 0 01.321-.988l5.518-.442a.563.563 0 00.475-.345L11.48 3.5z" />
                        </svg>
                    </button>
                    <button type="button" class="star-btn" data-score="4" onclick="setScore(4)">
                        <svg class="w-10 h-10 text-gray-600" fill="none" stroke="currentColor" stroke-width="1.5"
                            viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M11.48 3.499a.562.562 0 011.04 0l2.125 5.111a.563.563 0 00.475.345l5.518.442c.499.04.701.663.321.988l-4.204 3.602a.563.563 0 00-.182.557l1.285 5.385a.562.562 0 01-.84.61l-4.725-2.885a.563.563 0 00-.586 0L6.982 20.54a.562.562 0 01-.84-.61l1.285-5.386a.562.562 0 00-.182-.557l-4.204-3.602a.563.563 0 01.321-.988l5.518-.442a.563.563 0 00.475-.345L11.48 3.5z" />
                        </svg>
                    </button>
                    <button type="button" class="star-btn" data-score="5" onclick="setScore(5)">
                        <svg class="w-10 h-10 text-gray-600" fill="none" stroke="currentColor" stroke-width="1.5"
                            viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M11.48 3.499a.562.562 0 011.04 0l2.125 5.111a.563.563 0 00.475.345l5.518.442c.499.04.701.663.321.988l-4.204 3.602a.563.563 0 00-.182.557l1.285 5.385a.562.562 0 01-.84.61l-4.725-2.885a.563.563 0 00-.586 0L6.982 20.54a.562.562 0 01-.84-.61l1.285-5.386a.562.562 0 00-.182-.557l-4.204-3.602a.563.563 0 01.321-.988l5.518-.442a.563.563 0 00.475-.345L11.48 3.5z" />
                        </svg>
                    </button>
                </div>

                <p id="score-label" class="text-center text-sm text-gray-400 mb-6">Tap a star to rate</p>

                <!-- Checkboxes -->
                <div class="space-y-3 mb-8">
                    <label
                        class="flex items-center gap-3 px-4 py-3 bg-gray-800/60 border border-white/5 rounded-xl cursor-pointer hover:bg-gray-800 transition-colors">
                        <input type="checkbox" id="chk-on-time" checked
                            class="w-5 h-5 rounded border-gray-600 bg-gray-700 text-indigo-500 focus:ring-indigo-500 focus:ring-offset-0" />
                        <div>
                            <p class="text-sm font-medium">On Time</p>
                            <p class="text-xs text-gray-500">Delivery/pickup was within the agreed timeframe</p>
                        </div>
                    </label>

                    <label
                        class="flex items-center gap-3 px-4 py-3 bg-gray-800/60 border border-white/5 rounded-xl cursor-pointer hover:bg-gray-800 transition-colors">
                        <input type="checkbox" id="chk-as-described" checked
                            class="w-5 h-5 rounded border-gray-600 bg-gray-700 text-indigo-500 focus:ring-indigo-500 focus:ring-offset-0" />
                        <div>
                            <p class="text-sm font-medium">As Described</p>
                            <p class="text-xs text-gray-500">Product quality matched the listing description</p>
                        </div>
                    </label>
                </div>

                <!-- Submit -->
                <button type="submit" id="submit-btn" disabled
                    class="w-full py-3 bg-indigo-600 hover:bg-indigo-500 disabled:bg-gray-700 disabled:text-gray-500 rounded-xl font-semibold transition-colors">
                    Submit Rating
                </button>
            </form>
        </div>
    </div>

    <!-- ────── TOAST ────── -->
    <div id="toast"
        class="fixed bottom-6 left-1/2 -translate-x-1/2 hidden px-6 py-3 bg-green-600 rounded-xl text-sm font-medium shadow-lg z-[60]">
        ✅ Rating submitted successfully!
    </div>

    <script>
        let currentScore = 0;

        const SCORE_LABELS = {
            1: '😞 Poor',
            2: '😐 Below Average',
            3: '🙂 Average',
            4: '😊 Good',
            5: '🤩 Excellent!',
        };

        /**
         * Open the rating modal.
         * Call this from your QR/handshake completion flow.
         */
        function triggerRatingModal(orderId, targetUserId) {
            document.getElementById('rating-order-id').value = orderId;
            document.getElementById('rating-target-user').value = targetUserId;
            currentScore = 0;
            resetStars();

            const modal = document.getElementById('rating-modal');
            modal.classList.remove('hidden');
            // Trigger animation on next frame
            requestAnimationFrame(() => modal.classList.add('show'));
        }

        function closeRatingModal() {
            const modal = document.getElementById('rating-modal');
            modal.classList.remove('show');
            setTimeout(() => modal.classList.add('hidden'), 300);
        }

        function setScore(score) {
            currentScore = score;
            const stars = document.querySelectorAll('.star-btn');
            stars.forEach(btn => {
                const s = parseInt(btn.dataset.score);
                if (s <= score) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
            document.getElementById('score-label').textContent = SCORE_LABELS[score] || '';
            document.getElementById('submit-btn').disabled = false;
        }

        function resetStars() {
            document.querySelectorAll('.star-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('score-label').textContent = 'Tap a star to rate';
            document.getElementById('submit-btn').disabled = true;
        }

        async function submitRating(event) {
            event.preventDefault();

            const orderId = document.getElementById('rating-order-id').value;
            const targetUserId = document.getElementById('rating-target-user').value;
            const onTime = document.getElementById('chk-on-time').checked;
            const asDescribed = document.getElementById('chk-as-described').checked;

            if (!currentScore) return;

            const submitBtn = document.getElementById('submit-btn');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Submitting…';

            try {
                const token = localStorage.getItem('daladan_token') || '';
                const resp = await fetch(`/api/trust/orders/${orderId}/rate`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`,
                    },
                    body: JSON.stringify({
                        reviewee_id: targetUserId,
                        score: currentScore,
                        on_time: onTime,
                        as_described: asDescribed,
                    }),
                });

                if (!resp.ok) {
                    const err = await resp.json().catch(() => ({}));
                    throw new Error(err.detail || `HTTP ${resp.status}`);
                }

                // Success
                closeRatingModal();
                showToast('✅ Rating submitted successfully!');

            } catch (err) {
                console.error('Rating error:', err);
                showToast('❌ ' + err.message, true);
                submitBtn.disabled = false;
                submitBtn.textContent = 'Submit Rating';
            }
        }

        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `fixed bottom-6 left-1/2 -translate-x-1/2 px-6 py-3 rounded-xl text-sm font-medium shadow-lg z-[60] show ${isError ? 'bg-red-600' : 'bg-green-600'
                }`;
            setTimeout(() => {
                toast.classList.add('hidden');
                toast.classList.remove('show');
            }, 3000);
        }
    </script>

</body>

</html>
